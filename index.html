<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iMLKq | Admin System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // إعدادات Firebase الخاصة بك
  const firebaseConfig = {
    apiKey: "AIzaSyB4e0rmoGHEPnNsjpNgKB6osEyJqrzW2IQ",
    authDomain: "imlkq-data.firebaseapp.com",
    projectId: "imlkq-data",
    storageBucket: "imlkq-data.firebasestorage.app",
    messagingSenderId: "1098473505143",
    appId: "1:1098473505143:web:93ed40f13e2596cb2ea172",
    measurementId: "G-BK9QL72FQ4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // دالة تسجيل المتابعين في القاعدة
  window.registerUser = async () => {
    const name = document.getElementById('username-input').value;
    if(name.trim() === "") { alert("الرجاء كتابة اسمك"); return; }
    
    try {
      await addDoc(collection(db, "visitors"), {
        username: name,
        timestamp: serverTimestamp(),
        device: navigator.platform
      });
      localStorage.setItem('mlkq_user', name);
      location.reload();
    } catch (e) {
      console.error("Error: ", e);
      alert("تأكد من إعدادات Rules في Firebase");
    }
  };

  // دالة فتح روم الإدارة وجلب الداتا
  window.loadAdminData = async () => {
    const pass = prompt("أدخل رمز الإدارة السري:");
    if(pass !== "911") { alert("الرمز خطأ!"); return; }
    
    showPage('admin-room');
    const tableBody = document.getElementById('admin-table-body');
    tableBody.innerHTML = "<tr><td colspan='2'>جاري سحب بيانات الزوار...</td></tr>";
    
    try {
      const q = query(collection(db, "visitors"), orderBy("timestamp", "desc"));
      const querySnapshot = await getDocs(q);
      tableBody.innerHTML = "";
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const date = data.timestamp ? data.timestamp.toDate().toLocaleString('ar-EG') : "الآن";
        tableBody.insertAdjacentHTML('beforeend', `
          <tr>
            <td style="border:1px solid #444; padding:12px; color:var(--kick-green);">${data.username}</td>
            <td style="border:1px solid #444; padding:12px; color:#ccc;">${date}</td>
          </tr>
        `);
      });
    } catch (e) {
      alert("خطأ في جلب البيانات");
    }
  };
</script>

<style>
  :root { 
    --main-blue: #0074D9; 
    --kick-green: #2ecc71; 
    --light-blue: #7FDBFF; 
    --gold: #FFD700;
  }

  body {
    margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
    color: white; background-color: black; overflow-x: hidden;
    background-image: url('IMG_2566.jpeg'); background-size: cover;
    background-position: center; background-attachment: fixed;
  }

  body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px); z-index: -1;
  }

  /* التنسيقات الأساسية */
  .page { display: none; padding: 100px 20px 40px; animation: fadeIn 0.5s; max-width: 900px; margin: auto; }
  .active-page { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .openbtn { font-size: 30px; cursor: pointer; background: var(--main-blue); color: white; padding: 10px 15px; border: none; position: fixed; top: 20px; right: 20px; z-index: 4000; border-radius: 10px; }
  
  .sidebar { height: 100%; width: 0; position: fixed; z-index: 5000; top: 0; right: 0; background-color: rgba(0, 5, 15, 0.98); overflow-x: hidden; transition: 0.4s; padding-top: 20px; border-left: 2px solid var(--main-blue); }
  .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 20px; color: var(--light-blue); display: block; text-align: right; cursor: pointer; }
  .sidebar .closebtn { font-size: 40px; color: white; cursor: pointer; padding: 10px 25px; display: block; }

  /* لوحة الإدارة */
  .admin-card { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; border: 2px solid var(--main-blue); box-shadow: 0 0 20px rgba(0,116,217,0.3); }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: center; }
  th { background: var(--main-blue); color: white; padding: 12px; border: 1px solid #444; }

  /* العدادات واللوغو */
  header { text-align: center; margin-bottom: 30px; }
  .logo-img { width: 200px; height: 200px; border-radius: 50%; border: 5px solid var(--main-blue); }
  .counters-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
  .counter-item { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(0,116,217,0.3); min-width: 140px; text-align: center; }
  .counter-num { display: block; font-size: 30px; font-weight: bold; color: var(--kick-green); }

  input[type="text"] { width: 80%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid var(--main-blue); background: #111; color: white; text-align: center; }
  .btn-login { width: 85%; padding: 15px; background: var(--kick-green); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 20px; }

  #date-time-box { position: fixed; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 12px; border: 1px solid var(--main-blue); font-size: 14px; z-index: 4000; direction: ltr; }
</style>
</head>
<body onload="checkUser(); startClock();">

  <button class="openbtn" onclick="openNav()">☰</button>
  <div id="date-time-box"><div id="clock-time">--:--:--</div><div id="clock-date">--------</div></div>

  <div id="mySidebar" class="sidebar">
    <span class="closebtn" onclick="closeNav()">×</span>
    <a onclick="showPage('home-page')">🏠 الرئيسية</a>
    <a onclick="showPage('login-page')">👤 تسجيل دخول المتابعين</a>
    <a onclick="showPage('yt-page')">🎬 اليوتيوب</a>
    <a onclick="showPage('live-page')">🔴 البث المباشر</a>
    <hr style="border: 0.1px solid #333; margin: 10px 20px;">
    <a onclick="loadAdminData()" style="color:var(--gold); font-weight:bold;">🔐 روم الإدارة (خاص بك)</a>
  </div>

  <div id="home-page" class="page active-page">
    <header>
      <img src="IMG_9806.png" class="logo-img">
      <h1 style="font-size: 70px; color: var(--light-blue); margin: 10px 0;">iMLKq</h1>
      <div class="counters-row">
        <div class="counter-item"><span class="counter-num">37.3K</span><span>Followers</span></div>
        <div class="counter-item"><span class="counter-num">1M+</span><span>Views</span></div>
      </div>
    </header>
  </div>

  <div id="login-page" class="page">
    <div style="background:rgba(0,0,0,0.9); padding:50px; border-radius:25px; border:1px solid var(--main-blue); text-align:center;">
      <h2 style="color:var(--light-blue);">سجل حضورك في الموقع</h2>
      <input type="text" id="username-input" placeholder="اكتب اسمك هنا">
      <button class="btn-login" onclick="registerUser()">اعتماد الدخول</button>
    </div>
  </div>

  <div id="admin-room" class="page">
    <div class="admin-card">
      <h2 style="color:var(--gold); text-align:center;"><i class="fas fa-database"></i> مراقبة داتا الزوار</h2>
      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>تاريخ الدخول</th>
          </tr>
        </thead>
        <tbody id="admin-table-body">
          </tbody>
      </table>
      <button onclick="location.reload()" style="margin-top:20px; width:100%; padding:10px; background:transparent; border:1px solid var(--kick-green); color:var(--kick-green); cursor:pointer; border-radius:10px;">تحديث القائمة 🔄</button>
    </div>
  </div>

  <div id="yt-page" class="page">
    <h2 style="text-align: center; color: var(--light-blue);">مقاطع اليوتيوب</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
        <a href="https://youtu.be/_tFB1fDSBdk" target="_blank"><img src="https://img.youtube.com/vi/_tFB1fDSBdk/maxresdefault.jpg" style="width:100%; border-radius:15px;"></a>
    </div>
  </div>

  <div id="live-page" class="page">
    <div style="text-align:center; padding:50px; background:rgba(0,0,0,0.8); border-radius:20px; border:1px solid var(--main-blue);">
      <h2 style="color:var(--light-blue); font-size:40px;">KICK LIVE</h2>
      <a href="https://kick.com/imlkq" target="_blank" style="background:var(--kick-green); color:black; padding:15px 40px; border-radius:10px; text-decoration:none; font-weight:bold; display:inline-block; margin-top:20px;">دخول البث</a>
    </div>
  </div>

  <script>
    function openNav() { document.getElementById("mySidebar").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
      document.getElementById(pageId).classList.add('active-page');
      closeNav();
    }
    function startClock() {
      setInterval(() => {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('en-US');
        document.getElementById('clock-date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
      }, 1000);
    }
    function checkUser() {
      const savedUser = localStorage.getItem('mlkq_user');
      if(savedUser) { document.querySelector('h1').innerText = "هلا بك، " + savedUser; }
    }
  </script>
</body>
</html>
